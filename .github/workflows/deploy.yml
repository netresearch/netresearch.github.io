name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Both jobs are shared-reusable calls: this workflow has zero step-level
  # `uses:`. Every action (checkout, setup-node, upload-artifact,
  # upload-pages-artifact, deploy-pages, harden-runner) now lives in
  # netresearch/.github.
  build:
    uses: netresearch/.github/.github/workflows/pages-build.yml@main
    permissions:
      contents: read
    with:
      setup-node: true
      node-version: '22'
      # Dependency install stays in the token-free phase on purpose: this is
      # where third-party npm lifecycle scripts run.
      pre-build-command: npm ci
      # scripts/fetch-repos.mjs shells out to `gh api`, so GH_TOKEN must exist
      # in THIS phase — that is what `expose-github-token: build` provides.
      build-command: node scripts/fetch-repos.mjs && npx astro build
      expose-github-token: build
      # astro.config.mjs hardcodes `site:` and never reads PAGES_BASE_PATH /
      # PAGES_ORIGIN, and the previous build job never ran configure-pages.
      configure-pages: false
      artifact-path: dist

  deploy:
    needs: build
    uses: netresearch/.github/.github/workflows/pages-deploy.yml@main
    permissions:
      pages: write
      id-token: write
      contents: read
    with:
      artifact-path: ./dist
