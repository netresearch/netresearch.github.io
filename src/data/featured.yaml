- name: ofelia
  repo: netresearch/ofelia
  category: Infrastructure & DevOps
  description: >
    Docker job scheduler — crontab for containers. Features DAG-based execution
    ordering, pause/resume, timezone support, and label-based configuration.
  links:
    - type: docker
      url: https://hub.docker.com/r/netresearch/ofelia
      label: Docker Hub
    - type: gopkg
      url: https://pkg.go.dev/github.com/netresearch/ofelia
      label: pkg.go.dev

- name: go-cron
  repo: netresearch/go-cron
  category: Libraries & SDKs
  description: >
    Go cron job scheduler — drop-in replacement for robfig/cron with DAG engine,
    pause/resume, @triggered jobs, and quoted timezone support in cron expressions.
  links:
    - type: gopkg
      url: https://pkg.go.dev/github.com/netresearch/go-cron
      label: pkg.go.dev

- name: jira-skill
  repo: netresearch/jira-skill
  category: AI/Agent Skills
  description: >
    Agent Skill for intelligent Jira integration. MCP-configurable with search,
    issue creation, sprint management, and Netresearch-specific conventions.

- name: t3x-rte_ckeditor_image
  repo: netresearch/t3x-rte_ckeditor_image
  category: CMS Extensions
  description: >
    Image support in CKEditor for the TYPO3 ecosystem. Adds image handling
    capabilities to the TYPO3 rich text editor with FAL integration.
  links:
    - type: ter
      url: https://extensions.typo3.org/extension/rte_ckeditor_image
      label: rte_ckeditor_image
    - type: packagist
      url: https://packagist.org/packages/netresearch/rte-ckeditor-image
      label: Packagist

- name: timetracker
  repo: netresearch/timetracker
  category: Applications
  description: >
    Extensive time tracking solution with Jira integration, reporting,
    user management, and CSV export. Built on Symfony.

- name: t3x-contexts
  repo: netresearch/t3x-contexts
  category: CMS Extensions
  description: >
    Multi-channel contexts for TYPO3 — control record visibility based on
    IP ranges, geolocation, device types, HTTP headers, domains, and
    logical combinations. Includes geolocation and WURFL sub-extensions.
  links:
    - type: ter
      url: https://extensions.typo3.org/extension/contexts
      label: contexts
    - type: packagist
      url: https://packagist.org/packages/netresearch/contexts
      label: Packagist
    - type: github
      url: https://github.com/netresearch/t3x-contexts_geolocation
      label: t3x-contexts_geolocation
    - type: github
      url: https://github.com/netresearch/t3x-contexts_wurfl
      label: t3x-contexts_wurfl

- name: t3x-cowriter
  repo: netresearch/t3x-cowriter
  category: CMS Extensions
  description: >
    AI-powered content generation for TYPO3's CKEditor 5. Generates and
    refines content using LLMs directly within the rich text editor.
  links:
    - type: ter
      url: https://extensions.typo3.org/extension/t3_cowriter
      label: t3_cowriter
    - type: packagist
      url: https://packagist.org/packages/netresearch/t3-cowriter
